name: 🐛 Bug Report
description: Report an issue for LineageOS or Lunaris AOSP on POCO F7 Ultra (miro)
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible so we can look into it.
  - type: dropdown
    id: rom_type
    attributes:
      label: 💿 Which ROM are you using?
      description: Please select the specific ROM you have installed on your miro device.
      options:
        - "Lunaris AOSP (Android 16 QPR2)"
        - "LineageOS (Official/Unofficial Base)"
    validations:
      required: true
  - type: input
    id: rom_version
    attributes:
      label: 📅 Build Date / Version
      description: Enter the build date or version string (e.g., 2026-06-25 release).
      placeholder: "e.g., v1.0 Initial / June 2026 Security Patch"
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: 🚨 Description of the Bug
      description: A clear and concise description of what the bug is and when it happens.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: Tell us exactly how to trigger the bug.
      placeholder: |
        1. Open App '...'
        2. Toggle option '....'
        3. App crashes with error '....'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 📋 Logcat / Crash Logs
      description: Please drag and drop your MatLOG / Logcat file here, or paste the relevant log lines inside the code block.
      value: |
        ```text
        Paste log lines here if applicable
        ```
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots or Screen Recordings
      description: Drag and drop your images or video files directly into this box to upload them.
